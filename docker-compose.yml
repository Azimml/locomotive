services:
  db:
    image: postgres:16-alpine
    container_name: locomotive-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: dejurka
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dejurka"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: locomotive-ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: 12345
      PGDATABASE: dejurka
    volumes:
      - ./cache:/app/cache
      - ./chroma_db:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: locomotive-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  pgdata:
